version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: janis-polling-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=dynamodb,s3,sns,events,logs,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_HOST=localhost:4566
    volumes:
      - "./localstack-data:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - polling-network

networks:
  polling-network:
    driver: bridge

# Identificadores (Asegúrate de que mduran-bot_proyecto_cenco_replica sea tu key real)
sonar.projectKey=mduran-bot_proyecto_cenco_replica
sonar.organization=mduran-bot

# Rutas de reportes (Generados por el comando enfocado que configuramos)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=nosetests.xml

# Organización del análisis - LIMPIA ESTAS LÍNEAS
sonar.sources=max/polling/src
sonar.tests=max/polling
sonar.exclusions=**/venv/**

# Codificación
sonar.sourceEncoding=UTF-8
# ============================================================================
# SonarQube Configuration - Janis-Cencosud Integration Platform
# ============================================================================

sonar.projectKey=mduran-bot_proyecto_cenco_replica
sonar.organization=mduran-bot
sonar.projectName=Janis-Cencosud Data Integration
sonar.projectVersion=1.0

# ============================================================================
# SOURCE CODE CONFIGURATION
# ============================================================================

# Código fuente del sistema de polling
sonar.sources=max/polling/src

# Directorio de tests
sonar.tests=max/polling/tests

# Lenguaje del proyecto
sonar.language=py

# ============================================================================
# COVERAGE CONFIGURATION
# ============================================================================

# Reporte de coverage generado por pytest-cov
# Este archivo se genera con: pytest --cov=src --cov-report=xml:coverage.xml
sonar.python.coverage.reportPaths=max/polling/coverage.xml

# Coverage alcanzado: 61% (con tests de integración LocalStack)
# Desglose por módulo:
# - s3_writer.py: 100%
# - api_client.py: 90%
# - state_manager.py: 90%
# - pagination_handler.py: 82%
# - airflow_tasks.py: 60-70%

# ============================================================================
# EXCLUSIONS
# ============================================================================

# Archivos excluidos del análisis
sonar.exclusions=\
    **/*.md,\
    **/*.txt,\
    **/*.json,\
    **/*.yml,\
    **/*.yaml,\
    **/*.env,\
    **/*.ini,\
    **/docs/**,\
    **/terraform/**,\
    **/Documentacion/**,\
    **/htmlcov/**,\
    **/.pytest_cache/**,\
    **/.hypothesis/**,\
    **/node_modules/**,\
    **/venv/**,\
    **/env/**

# Archivos excluidos del coverage (no requieren tests)
sonar.coverage.exclusions=\
    **/__init__.py,\
    **/conftest.py

# ============================================================================
# TEST CONFIGURATION
# ============================================================================

# Patrón de archivos de test
sonar.test.inclusions=**/test_*.py

# Reporte de tests unitarios (opcional)
# sonar.python.xunit.reportPath=max/polling/test-results.xml

# ============================================================================
# CODE QUALITY SETTINGS
# ============================================================================

# Encoding del código fuente
sonar.sourceEncoding=UTF-8

# Nivel de log
sonar.log.level=INFO

# ============================================================================
# PYTHON SPECIFIC SETTINGS
# ============================================================================

# Versión de Python
sonar.python.version=3.11,3.12,3.13

# ============================================================================
# QUALITY GATES (Opcional)
# ============================================================================

# Umbral mínimo de coverage: 60% (actualmente en 61%)
# sonar.coverage.minimum=60

# Umbral de duplicación de código
# sonar.cpd.exclusions=**/tests/**
